<svg viewBox="0 0 340 700" xmlns="http://www.w3.org/2000/svg" font-family="Figtree, Arial, sans-serif">
<defs>
  <clipPath id="scr"><rect x="16" y="16" width="308" height="668" rx="40"/></clipPath>
</defs>
<!-- body -->
<rect x="4" y="4" width="332" height="692" rx="52" fill="#141318"/>
<rect x="9" y="9" width="322" height="682" rx="47" fill="#000"/>
<!-- side buttons -->
<rect x="2" y="150" width="3" height="34" rx="1.5" fill="#2a2730"/>
<rect x="2" y="196" width="3" height="54" rx="1.5" fill="#2a2730"/>
<rect x="335" y="180" width="3" height="74" rx="1.5" fill="#2a2730"/>
<!-- screen -->
<g clip-path="url(#scr)">
  <rect x="16" y="16" width="308" height="668" fill="#FFFFFF"/>

  <!-- status bar -->
  <text x="40" y="46" font-size="14" font-weight="700" fill="#1d1726">9:58</text>
  <g fill="#1d1726">
    <rect x="252" y="36" width="3" height="9" rx="1"/><rect x="258" y="33" width="3" height="12" rx="1"/><rect x="264" y="30" width="3" height="15" rx="1"/><rect x="270" y="28" width="3" height="17" rx="1"/>
    <text x="279" y="44" font-size="12" font-weight="700">4G</text>
    <rect x="296" y="33" width="20" height="11" rx="3" fill="none" stroke="#1d1726" stroke-width="1.4"/><rect x="298" y="35" width="14" height="7" rx="1.5"/><rect x="317" y="36" width="2" height="5" rx="1"/>
  </g>
  <!-- dynamic island -->
  <rect x="130" y="26" width="80" height="22" rx="11" fill="#000"/>

  <!-- progress -->
  <rect x="28" y="66" width="284" height="4" rx="2" fill="#E7E1EE"/>
  <rect x="28" y="66" width="95" height="4" rx="2" fill="#5FC93C"/>
  <text x="170" y="92" font-size="12.5" font-weight="800" letter-spacing="1.2" fill="#736B7E" text-anchor="middle">STEP 1 OF 3</text>
  <g stroke="#736B7E" stroke-width="2" stroke-linecap="round"><path d="M298 84 l12 12 M310 84 l-12 12"/></g>

  <!-- question -->
  <text x="28" y="128" font-size="18" font-weight="800" fill="#1d1726">Show us the tattoo</text>
  <text x="28" y="150" font-size="18" font-weight="800" fill="#1d1726">you want <tspan fill="#C0392B">*</tspan></text>
  <text x="28" y="174" font-size="13" fill="#736B7E">Upload your design or a reference photo.</text>

  <!-- dropzone -->
  <rect x="28" y="188" width="284" height="118" rx="14" fill="#EAF7E2" stroke="#5FC93C" stroke-width="2" stroke-dasharray="6 5"/>
  <g transform="translate(170 226)" stroke="#4AAE2C" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 8 V-8 M-6 -2 L0 -8 L6 -2"/><path d="M-10 8 V12 a2 2 0 0 0 2 2 H8 a2 2 0 0 0 2 -2 V8"/>
  </g>
  <text x="170" y="266" font-size="14" font-weight="800" fill="#2f7d1e" text-anchor="middle">Add a photo of your design</text>
  <text x="170" y="286" font-size="11.5" fill="#6f8a64" text-anchor="middle">JPG, PNG or a screenshot</text>

  <!-- thumbnails -->
  <g>
    <rect x="28" y="318" width="58" height="58" rx="9" fill="#E6DAF2"/>
    <path d="M57 332 C57 332 67 346 67 352 A10 10 0 1 1 47 352 C47 346 57 332 57 332 Z" fill="#311A41"/>
    <rect x="94" y="318" width="58" height="58" rx="9" fill="#E6DAF2"/>
    <g stroke="#311A41" stroke-width="2" fill="none" stroke-linecap="round"><path d="M110 352 c4 -10 14 -10 18 0" /><path d="M123 340 q4 4 8 2"/></g>
    <rect x="160" y="318" width="58" height="58" rx="9" fill="#F7F5FA" stroke="#DCD2E8" stroke-width="1.5" stroke-dasharray="4 4"/>
    <g transform="translate(189 347)" stroke="#736B7E" stroke-width="2" stroke-linecap="round"><path d="M-7 0 H7 M0 -7 V7"/></g>
  </g>

  <!-- optional note -->
  <text x="28" y="416" font-size="14" font-weight="800" fill="#1d1726">Anything to add? <tspan fill="#736B7E" font-weight="500">(optional)</tspan></text>
  <rect x="28" y="428" width="284" height="48" rx="10" fill="#fff" stroke="#DCD2E8" stroke-width="1.5"/>
  <text x="42" y="457" font-size="13.5" fill="#9990A3">e.g. keep it black &amp; grey</text>

  <!-- buttons -->
  <rect x="28" y="612" width="132" height="50" rx="10" fill="#fff" stroke="#C9BED6" stroke-width="2"/>
  <text x="94" y="643" font-size="15" font-weight="800" fill="#311A41" text-anchor="middle">Previous</text>
  <rect x="180" y="612" width="132" height="50" rx="10" fill="#5FC93C"/>
  <text x="246" y="643" font-size="15" font-weight="800" fill="#1F2F16" text-anchor="middle">Next</text>

  <!-- home indicator -->
  <rect x="130" y="672" width="80" height="5" rx="2.5" fill="#1d1726" opacity="0.85"/>
</g>
</svg>